<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Tienda</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <nav class="navbar navbar-dark bg-dark p-3">

        <div class="container-fluid">

            <span class="navbar-brand">
                🛒 Mi Tienda
            </span>

            <span class="badge bg-warning text-dark" id="badge">
                0
            </span>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="row">

            <div class="col-md-3">

                <div class="card p-3">

                    <img src="img/camisa.jpg" class="card-img-top" alt="Camisa">

                    <h5>Camisa</h5>

                    <p>$100.000</p>

                    <button class="btn btn-primary btn-agregar" data-nombre="Camisa" data-precio="100000">

                        Agregar

                    </button>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card p-3">

                    <img src="img/camiseta.jpg" class="card-img-top" alt="Camiseta">

                    <h5>Camiseta</h5>

                    <p>$50.000</p>

                    <button class="btn btn-primary btn-agregar" data-nombre="Camiseta" data-precio="50000">

                        Agregar

                    </button>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card p-3">

                    <img src="img/pantalon.jpg" class="card-img-top" alt="Pantalon">

                    <h5>Pantalon</h5>

                    <p>$150.000</p>

                    <button class="btn btn-primary btn-agregar" data-nombre="Pantalon" data-precio="150000">

                        Agregar

                    </button>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card p-3">

                    <img src="img/zapatos.jpg" class="card-img-top" alt="Zapatos">

                    <h5>Zapatos</h5>

                    <p>$250.000</p>

                    <button class="btn btn-primary btn-agregar" data-nombre="Zapatos" data-precio="250000">

                        Agregar

                    </button>

                </div>

            </div>

        </div>

    </div>

    <div class="container mt-5">

        <h3>🛍 Carrito de Compras</h3>

        <!-- Lista del carrito -->
        <ul id="lista-carrito" class="list-group mb-3">

            <!-- Mensaje cuando está vacío -->
            <li id="msg-vacio" class="list-group-item">
                Tu carrito está vacío
            </li>

        </ul>

        <p>
            Total: $
            <span id="total">0</span>

        </p>

        <button class="btn btn-danger" id="btn-vaciar">
            Vaciar carrito
        </button>

    </div>

    <footer class="footer">

        <p>© 2026 Mi Tienda</p>

        <p>
            Desarrollado por Juan Castro 👨‍💻
        </p>

        <p>
            📧 mitienda@gmail.com
        </p>

    </footer>

    <script src="app.js"></script>

</body>

</html>
